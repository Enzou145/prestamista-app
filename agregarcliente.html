<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="agregarcliente.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Averia+Sans+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Cabin+Condensed:wght@400;500;600;700&family=Figtree:ital,wght@0,300..900;1,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=News+Cycle:wght@400;700&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>
    
    <div class="tabla">

        <div class="titulo">
            <h1>Nuevo Cliente</h1>
            <p>Ingresa los datos para registrar un nuevo cliente</p>
        </div>

        <div class="nombre-apellido">
            <div class="nombre">
                <label>Nombre</label>
                <input type="text" placeholder="nombre">
            </div>
            <div class="apellido">
                <label>Apellido</label>
                <input type="text" placeholder="apellido">
            </div>  
        </div>

        <div class="telefono">
                <label>Telefono</label>
                <input type="text" placeholder="telefono">
        </div>

        <div class="email">
                <label>Email</label>
                <input type="text" placeholder="enzovera@gmail.com">
        </div>

        <div class="campo">
            <label for="estado">ESTADO INICIAL</label>
            <select id="estado" name="estado">
                <option value="activo">Activo</option>
                <option value="inactivo">No activo</option>
            </select>
        </div>

        <div class="botones">
            <a href="clientes.html"> <button>Cancelar</button></a>
            <a href="clientes.html"> <button>Guardar Cliente</button></a>
        </div>

    </div>
</body>
</html>
